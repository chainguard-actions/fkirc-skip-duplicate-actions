name: Test paths input and concurrent_skipping options
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: fake-token-for-testing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: skip_check
        uses: .
        with:
          github_token: ${{ env.GITHUB_TOKEN }}
          concurrent_skipping: 'same_content'
          skip_after_successful_duplicate: 'true'
          cancel_others: 'false'
          do_not_skip: '["workflow_dispatch", "schedule"]'
          paths: '["src/**", "lib/**"]'
        continue-on-error: true

      - name: Assert outputs for paths with same_content concurrent_skipping
        env:
          SHOULD_SKIP: ${{ steps.skip_check.outputs.should_skip }}
          REASON: ${{ steps.skip_check.outputs.reason }}
          CHANGED_FILES: ${{ steps.skip_check.outputs.changed_files }}
        run: |
          echo "should_skip: $SHOULD_SKIP"
          echo "reason: $REASON"
          echo "changed_files: $CHANGED_FILES"
          # workflow_dispatch is in do_not_skip, so should not be skipped
          if [ -n "$SHOULD_SKIP" ] && [ "$SHOULD_SKIP" != "false" ]; then
            echo "FAIL: expected should_skip to be false for workflow_dispatch"
            exit 1
          fi
          echo "PASS: paths input and concurrent_skipping=same_content accepted"
