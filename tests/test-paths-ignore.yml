name: Test paths_ignore input
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    env:
      GITHUB_TOKEN: fake-token-for-testing
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - id: skip_check
        uses: .
        with:
          github_token: ${{ env.GITHUB_TOKEN }}
          concurrent_skipping: 'never'
          skip_after_successful_duplicate: 'false'
          cancel_others: 'false'
          do_not_skip: '["workflow_dispatch", "schedule"]'
          paths_ignore: '["**.md", "**.txt", "docs/**"]'
        continue-on-error: true

      - name: Assert should_skip output for workflow_dispatch with paths_ignore
        env:
          SHOULD_SKIP: ${{ steps.skip_check.outputs.should_skip }}
          REASON: ${{ steps.skip_check.outputs.reason }}
        run: |
          echo "should_skip: $SHOULD_SKIP"
          echo "reason: $REASON"
          # workflow_dispatch is in do_not_skip, so should not be skipped
          if [ -n "$SHOULD_SKIP" ] && [ "$SHOULD_SKIP" != "false" ]; then
            echo "FAIL: expected should_skip to be false for workflow_dispatch"
            exit 1
          fi
          echo "PASS: paths_ignore input accepted, should_skip is '$SHOULD_SKIP'"
